name: Apply Vastgoedrekenen drawer layout fix

on:
  push:
    branches: [feat/vastgoedrekenen-fase-1-1]
    paths:
      - scripts/apply_vastgoedrekenen_drawer_layout_fix.py
      - .github/workflows/apply-vastgoedrekenen-drawer-layout-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout featurebranch
        uses: actions/checkout@v4
        with:
          ref: feat/vastgoedrekenen-fase-1-1
          fetch-depth: 0

      - name: Apply drawer layout correction
        run: python3 scripts/apply_vastgoedrekenen_drawer_layout_fix.py

      - name: Remove temporary files and commit
        run: |
          rm -f scripts/apply_vastgoedrekenen_drawer_layout_fix.py
          rm -f .github/workflows/apply-vastgoedrekenen-drawer-layout-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: improve component strategy drawer layout"
          git push origin HEAD:feat/vastgoedrekenen-fase-1-1
