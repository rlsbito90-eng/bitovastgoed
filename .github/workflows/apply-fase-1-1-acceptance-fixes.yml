name: Apply Fase 1.1 acceptance fixes

on:
  push:
    branches: [feat/vastgoedrekenen-fase-1-1]
    paths:
      - scripts/apply_fase_1_1_acceptance_fixes.py
      - .github/workflows/apply-fase-1-1-acceptance-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip acceptance apply]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout featurebranch
        uses: actions/checkout@v4
        with:
          ref: feat/vastgoedrekenen-fase-1-1
          fetch-depth: 0

      - name: Apply targeted corrections
        run: python3 scripts/apply_fase_1_1_acceptance_fixes.py

      - name: Remove one-off migration tooling
        run: rm scripts/apply_fase_1_1_acceptance_fixes.py .github/workflows/apply-fase-1-1-acceptance-fixes.yml

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: align Vastgoedrekenen acceptance UX [skip acceptance apply]"
          git push origin HEAD:feat/vastgoedrekenen-fase-1-1
